version: 2
updates:
    - package-ecosystem: npm
      directory: '/'
      schedule:
          interval: 'cron'
          timezone: 'Europe/Berlin'
          cronjob: '25 3 13 * *'
      open-pull-requests-limit: 15
      assignees:
          - UncleSamSwiss
      versioning-strategy: increase
      cooldown:
          default-days: 7

    - package-ecosystem: github-actions
      directory: '/'
      schedule:
          interval: 'cron'
          timezone: 'Europe/Berlin'
          cronjob: '25 3 13 * *'
      open-pull-requests-limit: 15
      assignees:
          - UncleSamSwiss
